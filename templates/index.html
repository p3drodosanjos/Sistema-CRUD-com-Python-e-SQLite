<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Voluntários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">Portal de Voluntários</h2>

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-hover table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Habilidade Principal</th>
                        <th>Disponibilidade</th>
                    </tr>
                </thead>
                <tbody>
                    {% for vol in lista_voluntarios %}
                    <tr>
                        <td>{{ vol[0] }}</td>
                        <td>{{ vol[1] }}</td>
                        <td>{{ vol[2] }}</td>
                        <td>{{ vol[3] }}</td>
                        <td>{{ vol[4] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
