<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Voluntários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">Portal de Voluntários</h2>

    <div class="text-end mb-3">
        <a href="/cadastrar" class="btn btn-primary fw-bold">➕ Novo Voluntário</a>
    </div>
<div class="card shadow">
        <div class="card-body">
            <table class="table table-hover table-striped table-bordered align-middle">
                <thead class="table-dark text-center">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Habilidade</th>
                        <th>Disponibilidade</th>
                        <th>Telefone</th>
                        <th>CPF</th>
                        <th>Ações</th> </tr>
                </thead>
                <tbody>
                    {% for vol in lista_voluntarios %}
                    <tr>
                        <td class="text-center">{{ vol[0] }}</td>
                        <td>{{ vol[1] }}</td>
                        <td>{{ vol[2] }}</td>
                        <td>{{ vol[3] }}</td>
                        <td>{{ vol[4] }}</td>
                        <td>{{ vol[5] }}</td>
                        <td>{{ vol[6] }}</td>
                        <td class="text-center">
                            <a href="/editar/{{ vol[0] }}" class="btn btn-warning btn-sm">✏️ Editar</a>
                            
                            <a href="/deletar/{{ vol[0] }}" class="btn btn-danger btn-sm" onclick="return confirm('Tem certeza que deseja excluir o cadastro de {{ vol[1] }}?');">🗑️ Excluir</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
