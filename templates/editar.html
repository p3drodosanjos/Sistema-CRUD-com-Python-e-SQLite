<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Voluntário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 600px;">
    <h2 class="text-center mb-4">Editar Voluntário</h2>

    <div class="card shadow border-warning">
        <div class="card-body">
            <form action="/editar/{{ voluntario[0] }}" method="POST">
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Nome Completo</label>
                    <input type="text" name="nome" class="form-control" value="{{ voluntario[1] }}" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">E-mail</label>
                        <input type="email" name="email" class="form-control" value="{{ voluntario[2] }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Telefone</label>
                        <input type="text" name="telefone" class="form-control" value="{{ voluntario[5] }}">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">CPF</label>
                        <input type="text" name="cpf" class="form-control" value="{{ voluntario[6] }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Habilidade Principal</label>
                        <input type="text" name="habilidade" class="form-control" value="{{ voluntario[3] }}" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Disponibilidade</label>
                    <input type="text" name="disponibilidade" class="form-control" value="{{ voluntario[4] }}" required>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-warning fw-bold">🔄 Atualizar Cadastro</button>
                    <a href="/" class="btn btn-outline-secondary">Cancelar</a>
                </div>
                
            </form>
        </div>
    </div>
</div>

</body>
</html>
